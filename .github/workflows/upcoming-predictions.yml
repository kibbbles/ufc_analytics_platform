name: Upcoming Predictions

# Scrapes upcoming UFC events and computes ML predictions every Saturday
# Runs at 15:00 UTC (10 AM EST) — in time for Saturday fight cards
on:
  schedule:
    - cron: '0 15 * * 6'  # Every Saturday at 15:00 UTC (10 AM EST)
  workflow_dispatch:       # Allow manual trigger

jobs:
  scrape-and-predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run upcoming scraper + predictions
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          python scraper/run_upcoming.py

      - name: Fetch Vegas odds
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          cd backend
          python scraper/fetch_odds.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: upcoming-scraper-logs
          path: |
            backend/*.log
            backend/scraper/*.log
          retention-days: 7

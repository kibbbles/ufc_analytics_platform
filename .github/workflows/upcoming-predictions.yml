name: Upcoming Predictions

# Scrapes upcoming UFC events and computes ML predictions every Saturday
# Runs at 15:00 UTC (10 AM EST) — in time for Saturday fight cards
on:
  schedule:
    - cron: '0 15 * * 6'  # Every Saturday at 15:00 UTC (10 AM EST)
  workflow_dispatch:       # Allow manual trigger

jobs:
  scrape-and-predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Diagnose UFCStats connectivity
        run: |
          echo "=== HTTP status + headers ==="
          curl -s -o /tmp/ufcstats_body.html -w "HTTP %{http_code} | Final URL: %{url_effective} | Size: %{size_download} bytes\nServer: %header{server}\nCF-Ray: %header{cf-ray}\nContent-Type: %header{content-type}\n" \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
            -L "http://ufcstats.com/statistics/events/upcoming?page=all" || true
          echo "=== Body preview (first 600 chars) ==="
          head -c 600 /tmp/ufcstats_body.html || true
          echo ""
          echo "=== Title tag ==="
          grep -o '<title>[^<]*</title>' /tmp/ufcstats_body.html || echo "(no title found)"

      - name: Run upcoming scraper + predictions
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          python scraper/run_upcoming.py

      - name: Fetch Vegas odds
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          cd backend
          python scraper/fetch_odds.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: upcoming-scraper-logs
          path: |
            backend/*.log
            backend/scraper/*.log
          retention-days: 7

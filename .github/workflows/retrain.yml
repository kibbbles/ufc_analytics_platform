name: Retrain ML Models

on:
  # Auto-trigger after Feature Engineering Pipeline succeeds (full weekly chain)
  workflow_run:
    workflows: ['Feature Engineering Pipeline']
    types: [completed]
  # Also allow manual trigger with optional eval-only mode
  workflow_dispatch:
    inputs:
      eval_only:
        description: 'Evaluate only (do not commit model files)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write
  actions: write

jobs:
  retrain:
    name: Train and serialize models
    runs-on: ubuntu-latest

    # Skip if the triggering feature-engineering workflow failed.
    # When triggered manually (workflow_dispatch) there is no workflow_run
    # context, so we always allow it through.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Rebuild training matrix (ensure parquet is fresh)
        working-directory: backend
        run: python features/run_build.py

      - name: Train models
        working-directory: backend
        run: |
          if [ "${{ github.event.inputs.eval_only }}" = "true" ]; then
            python -m ml.run_train --eval-only
          else
            python -m ml.run_train
          fi

      - name: Commit model artefacts
        if: ${{ github.event.inputs.eval_only != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/models/win_loss_v1.joblib \
                  backend/models/method_v1.joblib \
                  backend/models/feature_importance.json \
                  backend/models/metrics.json \
                  backend/models/experiment_log.json \
                  backend/models/shap_summary.json \
                  backend/models/shap_importance.png
          git diff --cached --quiet || git commit -m "chore: retrain models [skip ci]"
          git push

      - name: Trigger backend deploy
        if: ${{ github.event.inputs.eval_only != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-backend.yml --ref main

name: Deploy Backend to Cloud Run

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build \
            --tag us-central1-docker.pkg.dev/kabes-maybes/kabes-maybes/api:latest \
            .

      - name: Push image
        run: |
          docker push us-central1-docker.pkg.dev/kabes-maybes/kabes-maybes/api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy kabes-maybes-api \
            --image us-central1-docker.pkg.dev/kabes-maybes/kabes-maybes/api:latest \
            --region us-central1 \
            --project kabes-maybes \
            --update-secrets GROQ_API_KEY=GROQ_API_KEY:latest \
            --quiet

      - name: Prune old images
        run: |
          gcloud artifacts docker images list \
            us-central1-docker.pkg.dev/kabes-maybes/kabes-maybes/api \
            --filter="tags!~latest" \
            --format="get(digest)" \
            --project=kabes-maybes | \
          xargs -I {} gcloud artifacts docker images delete \
            "us-central1-docker.pkg.dev/kabes-maybes/kabes-maybes/api@{}" \
            --project=kabes-maybes --quiet --delete-tags || true

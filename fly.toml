# fly.toml — Fly.io deployment config for the UFC Analytics API
#
# BEFORE FIRST DEPLOY — two things to change:
#   1. Set app name below (must be globally unique on Fly.io, e.g. "yourname-ufc-api")
#   2. Set secrets from your terminal:
#        fly secrets set DATABASE_URL="postgresql://..."
#        fly secrets set ALLOWED_ORIGINS='["https://your-app.vercel.app","http://localhost:3000"]'
#
# DEPLOY COMMAND (from repo root):
#   fly deploy

app            = "kabes-maybes-api"
primary_region = "iad"                 # Washington DC — closest to Supabase default

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  LOG_LEVEL   = "info"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = false   # Never sleep — eliminates cold starts
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

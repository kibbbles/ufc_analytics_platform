services:
  - type: web
    name: kabes-maybes-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false          # set manually in Render dashboard
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
